<div class="fixed left-0 top-0 right-0 bottom-0 p-4 bg-black/70 flex justify-center items-center z-50" (pointerdown)="cerrar.emit()">
    <div hlmCard (pointerdown)="$event.stopPropagation()" (click)="$event.stopPropagation()" class="px-3">
        <div hlmCardHeader class="faster-fade-in">
            <div class="flex items-center gap-3 my-2">
                <ng-icon hlm name="lucideCircleAlert" class="text-destructive" />
                <h3 hlmCardTitle>{{ titulo }}</h3>
            </div>
            <hlm-separator />
        </div>
        <div hlmCardContent class="faster-fade-in">
            <p hlmP class="text-center text-balance mx-1" [innerHTML]="descripcion"></p>
            @if (textoVerificacion) {
                <div class="mt-4">
                    <p class="text-sm mx-1">
                        {{ descripcionTextVerificacion ?? `Para confirmar, escribe a continuación "${textoVerificacion}":` }}
                    </p>
                    <input
                        hlmInput
                        [placeholder]="textoVerificacion"
                        class="mt-2"
                        [value]="textoVerificacionIngresado()"
                        (input)="textoVerificacionIngresado.set($any($event.target).value)"
                    />
                </div>
            }
        </div>
        <div hlmCardFooter class="flex items-center justify-end gap-6 faster-fade-in">
            <button hlmBtn variant="outlineAzul" (click)="cerrar.emit()">
                {{ textoBotonCancelar }}
            </button>
            <button
                hlmBtn
                variant="destructive"
                (click)="confirmarEliminacion()"
                [disabled]="textoVerificacion && textoVerificacion !== textoVerificacionIngresado()"
            >
                {{ textoBotonEliminar }}
            </button>
        </div>
    </div>
</div>

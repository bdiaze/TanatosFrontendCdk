@if (!safeContent()) {
    <div class="focus-within:ring-[3px] focus-within:border-ring focus-within:ring-ring/50 rounded-md transition-[color,box-shadow] outline-none border">
        <div #editor class="max-h-[30vh] overflow-y-auto scrollContainer"></div>
    </div>
} @else {
    <div class="ql-container ql-snow" style="border: none">
        <div class="ql-editor py-0!" [innerHTML]="safeContent()"></div>
    </div>
}

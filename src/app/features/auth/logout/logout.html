<button
    hlmBtn
    (click)="cerrarSesion()"
    [disabled]="deshabilitarBoton()"
    class="px-4! text-[0.7rem] h-[1.9rem]! lg:text-[0.8rem]! lg:h-[2.1rem]!"
    [ngClass]="{
        'bg-calipso! hover:bg-(--calipso)/80!': primary,
        'bg-transparent! hover:bg-accent/20! border-calipso! hover:border-calipso/80! text-calipso! border-2!': !primary,
    }"
>
    @if (mostrarCargando()) {
        <hlm-spinner />
    }
    Cerrar Sesión
</button>

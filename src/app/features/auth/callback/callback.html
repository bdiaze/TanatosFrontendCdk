<section class="h-full w-full fade-in">
    <div class="flex flex-row items-stretch justify-start h-full">
        <div class="hidden md:flex md:w-1/4 lg:w-1/4 xl:w-1/5 2xl:w-1/6">
            <hlm-skeleton class="h-full w-full rounded-none" />
        </div>
        <div class="max-w-2xl mx-auto flex-1 flex flex-col items-start justify-start gap-4 px-6 pt-4 pb-6">
            @if (error()) {
                <div hlmAlert variant="destructive" class="mt-6">
                    <ng-icon hlm hlmAlertIcon name="lucideTriangleAlert" />
                    <h4 hlmAlertTitle>¡Ocurrió un error al iniciar sesión!</h4>
                    <p hlmAlertDescription>{{ error() }}</p>
                </div>
            }
            <div class="flex flex-col justify-start items-start gap-2 w-full fade-in">
                <hlm-skeleton class="h-11 w-3/4 rounded-xl" />
                <hlm-skeleton class="h-7 w-1/2 rounded-xl" />
                <hlm-skeleton class="h-10 w-full md:h-5 md:w-132 rounded-xl" />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 items-stretch gap-3 w-full">
                <hlm-skeleton class="w-full h-58 rounded-none" />
                <hlm-skeleton class="w-full h-58 rounded-none" />
                <hlm-skeleton class="w-full h-58 rounded-none" />
                <hlm-skeleton class="w-full h-58 rounded-none" />
            </div>
        </div>
    </div>
</section>

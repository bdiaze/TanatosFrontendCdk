<section class="min-w-0 fade-in h-full">
    <div>
        <div class="flex justify-center-safe items-center gap-3 py-4">
            <ng-icon hlm name="lucideMessageCircleMore" />
            <h3 hlmH3>Chats de Whatsapp</h3>
        </div>
    </div>
    <div class="w-full overflow-x-auto scrollContainerHorizontal">
        <app-whatsapp-conversaciones
            (selectionChanged)="numeroTelefonoCambiado($event)"
        ></app-whatsapp-conversaciones>
    </div>
    <div class="w-full px-2 py-4 h-full">
        <app-whatsapp-mensajes
            [numeroTelefono]="chatAbierto()"
            class="h-full"
        ></app-whatsapp-mensajes>
    </div>
</section>
